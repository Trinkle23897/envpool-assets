name: Build wheel

on:
  workflow_dispatch:
    inputs:
      envpool_repository:
        description: EnvPool repository to source assets from.
        required: true
        default: sail-sg/envpool
      envpool_ref:
        description: EnvPool git ref to build assets from.
        required: true
        default: main
      version:
        description: Asset package version.
        required: true
        default: "0.3.0"
      publish_to_pypi:
        description: Publish the built wheels to PyPI.
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - base
          - mujoco-large
          - mujoco-playground-humanoid

    steps:
      - name: Check out envpool-assets
        uses: actions/checkout@v4

      - name: Check out EnvPool
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.envpool_repository || 'sail-sg/envpool' }}
          ref: ${{ github.event.inputs.envpool_ref || 'main' }}
          path: .envpool-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Resolve package version
        env:
          VERSION_INPUT: ${{ github.event.inputs.version || '' }}
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$VERSION_INPUT"
          fi
          if [ -z "$version" ]; then
            echo "asset package version is required" >&2
            exit 1
          fi
          echo "ASSET_VERSION=$version" >> "$GITHUB_ENV"
          echo "asset package version: $version"

      - name: Collect EnvPool assets
        run: |
          python scripts/collect_envpool_assets.py \
            --envpool-root .envpool-src \
            --output-root ".asset-root-${{ matrix.package }}" \
            --package "${{ matrix.package }}"

      - name: Build asset wheel
        run: |
          python scripts/build_wheel.py \
            --asset-root ".asset-root-${{ matrix.package }}" \
            --version "$ASSET_VERSION" \
            --package "${{ matrix.package }}" \
            --dist-dir dist

      - name: Optimize wheel
        run: |
          python scripts/optimize_wheel.py dist/*.whl

      - name: Check wheel
        run: |
          python -m pip install twine
          python -m twine check dist/*.whl
          python - <<'PY'
          from pathlib import Path

          wheels = list(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {wheels}")
          limit = 100_000_000
          size = wheels[0].stat().st_size
          print(f"{wheels[0]}: {size} bytes")
          if size >= limit:
              raise SystemExit(f"wheel exceeds {limit} bytes")
          PY

      - name: Smoke test wheel
        run: |
          python -m pip install --target /tmp/envpool-assets-test dist/*.whl
          PYTHONPATH=/tmp/envpool-assets-test:. python - "${{ matrix.package }}" <<'PY'
          import importlib
          import importlib.util
          import sys
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "build_wheel_config", Path("scripts/build_wheel.py")
          )
          build_wheel = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(build_wheel)

          package = sys.argv[1]
          config = build_wheel.PACKAGE_CONFIGS[package]
          module = importlib.import_module(str(config["module_name"]))
          root = module.asset_path()
          for rel in config["asset_paths"]:
              path = root / rel
              if not path.exists():
                  raise SystemExit(f"missing asset path: {path}")
          for rel in config["forbidden_paths"]:
              path = root / rel
              if path.exists():
                  raise SystemExit(
                      f"platform-specific file leaked into wheel: {path}"
                  )
          print(root)
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: envpool-assets-${{ matrix.package }}-wheel
          path: dist/*.whl
          if-no-files-found: error

  publish-pypi:
    needs: build-wheel
    if: github.event_name == 'push' || github.event.inputs.publish_to_pypi == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: base
            environment: pypi
          - package: mujoco-large
            environment: pypi-mujoco-large
          - package: mujoco-playground-humanoid
            environment: pypi-mujoco-playground-humanoid
    environment:
      name: ${{ matrix.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: envpool-assets-${{ matrix.package }}-wheel
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
